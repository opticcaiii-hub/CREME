<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FAF6F0;--brown:#3B1F0E;--gold:#C9A87C;--light-gold:#E8D8C4;
  --white:#ffffff;--text:#2C1A0E;--muted:#9B6F4A;--green:#27AE60;
  --red:#E74C3C;--shadow:0 4px 24px rgba(59,31,14,0.10);
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--cream);}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:10px;}

/* ── CONFIG BANNER ── */
#config-banner{
  width:100%;max-width:480px;background:#fff3cd;border:1px solid #ffc107;
  border-radius:10px;padding:12px 16px;margin-bottom:10px;font-size:13px;color:#856404;
  display:none;
}
#config-banner a{color:#533f03;font-weight:500;cursor:pointer;text-decoration:underline;}

/* ── CHAT WRAPPER ── */
.chat-wrap{
  width:100%;max-width:480px;border-radius:22px;
  box-shadow:var(--shadow);overflow:hidden;
  display:flex;flex-direction:column;height:680px;
  background:var(--white);
}

/* ── HEADER ── */
.header{
  background:var(--brown);padding:14px 18px;
  display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.logo{
  width:42px;height:42px;border-radius:50%;background:var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:10px;font-weight:600;
  color:var(--brown);text-align:center;line-height:1.2;letter-spacing:0.3px;flex-shrink:0;
}
.header-info{flex:1}
.header-name{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;color:#F5EDD8;letter-spacing:0.5px;}
.header-sub{font-size:11px;color:var(--gold);display:flex;align-items:center;gap:5px;margin-top:2px;}
.online-dot{width:6px;height:6px;background:#5AC878;border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.cart-btn{
  background:rgba(201,168,124,0.2);border:1px solid rgba(201,168,124,0.4);
  color:var(--gold);border-radius:12px;padding:6px 12px;
  font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;
  transition:all 0.2s;white-space:nowrap;
}
.cart-btn:hover{background:rgba(201,168,124,0.35);}
.cart-count{
  background:var(--gold);color:var(--brown);border-radius:50%;
  width:18px;height:18px;font-size:10px;font-weight:600;
  display:flex;align-items:center;justify-content:center;
}

/* ── MESSAGES ── */
.msgs{
  flex:1;overflow-y:auto;padding:14px 12px;
  display:flex;flex-direction:column;gap:10px;
  background:var(--cream);scroll-behavior:smooth;
}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-thumb{background:var(--light-gold);border-radius:4px}

.msg{max-width:82%;display:flex;flex-direction:column;}
.msg.bot{align-self:flex-start;}
.msg.user{align-self:flex-end;}
.msg-name{font-size:10px;color:var(--muted);font-style:italic;
  font-family:'Cormorant Garamond',serif;margin-bottom:3px;padding-left:2px;}
.msg-bubble{
  padding:10px 14px;border-radius:16px;font-size:13.5px;line-height:1.6;
}
.msg.bot .msg-bubble{
  background:var(--white);color:var(--text);
  border-radius:4px 16px 16px 16px;
  border:0.5px solid var(--light-gold);
}
.msg.user .msg-bubble{
  background:var(--brown);color:#F5EDD8;
  border-radius:16px 4px 16px 16px;
}
.msg-time{font-size:10px;color:var(--muted);margin-top:3px;padding:0 4px;}
.msg.user .msg-time{text-align:right;}

/* ── TYPING ── */
.typing-wrap{align-self:flex-start;display:flex;flex-direction:column;}
.typing-bubble{
  background:var(--white);border:0.5px solid var(--light-gold);
  border-radius:4px 16px 16px 16px;padding:12px 16px;
  display:flex;gap:5px;align-items:center;
}
.typing-bubble span{
  width:7px;height:7px;background:var(--gold);border-radius:50%;
  animation:blink 1.2s infinite;
}
.typing-bubble span:nth-child(2){animation-delay:.2s}
.typing-bubble span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}

/* ── CHIPS ── */
.chips{
  padding:8px 12px 6px;display:flex;flex-wrap:wrap;gap:6px;
  background:var(--cream);flex-shrink:0;
}
.chip{
  background:var(--white);border:1px solid var(--gold);color:var(--brown);
  font-size:12px;padding:6px 13px;border-radius:20px;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all 0.18s;white-space:nowrap;
  display:flex;align-items:center;gap:4px;
}
.chip:hover{background:var(--brown);color:#F5EDD8;border-color:var(--brown);}

/* ── INPUT ROW ── */
.input-row{
  display:flex;align-items:center;gap:8px;padding:10px 12px;
  border-top:1px solid var(--light-gold);background:var(--white);flex-shrink:0;
}
.input-row input{
  flex:1;border:1px solid var(--light-gold);border-radius:22px;
  padding:9px 16px;font-size:13.5px;font-family:'DM Sans',sans-serif;
  background:var(--cream);color:var(--text);outline:none;transition:border 0.2s;
}
.input-row input:focus{border-color:var(--brown);}
.send-btn{
  width:38px;height:38px;background:var(--brown);border:none;border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:#F5EDD8;font-size:17px;flex-shrink:0;transition:opacity 0.15s;
}
.send-btn:hover{opacity:.82}

/* ── MENU CARD ── */
.menu-card{
  background:var(--white);border:1px solid var(--light-gold);
  border-radius:14px;padding:12px 14px;margin-top:4px;
  max-width:92%;align-self:flex-start;
}
.menu-card-title{
  font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;
  color:var(--brown);margin-bottom:8px;border-bottom:1px solid var(--light-gold);
  padding-bottom:6px;
}
.menu-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 0;border-bottom:0.5px solid #f0e8dc;gap:8px;
}
.menu-item:last-child{border-bottom:none;}
.item-info{flex:1;min-width:0;}
.item-name{font-size:13px;color:var(--text);font-weight:500;}
.item-price{font-size:11px;color:var(--muted);margin-top:1px;}
.qty-control{
  display:flex;align-items:center;gap:5px;flex-shrink:0;
}
.qty-btn{
  width:24px;height:24px;border-radius:50%;border:1px solid var(--gold);
  background:transparent;color:var(--brown);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;line-height:1;
  font-weight:500;transition:all 0.15s;
}
.qty-btn:hover{background:var(--brown);color:#F5EDD8;}
.qty-num{font-size:13px;font-weight:600;color:var(--brown);min-width:16px;text-align:center;}

/* ── CART PANEL ── */
.cart-panel{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:var(--white);z-index:10;display:flex;flex-direction:column;
  border-radius:22px;overflow:hidden;
}
.cart-header{
  background:var(--brown);padding:14px 18px;display:flex;align-items:center;gap:10px;color:#F5EDD8;
}
.cart-header-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;letter-spacing:0.5px;}
.back-btn{
  background:rgba(201,168,124,0.2);border:1px solid rgba(201,168,124,0.4);
  color:var(--gold);border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;margin-left:auto;
  transition:all 0.15s;
}
.back-btn:hover{background:rgba(201,168,124,0.4);}
.cart-items{flex:1;overflow-y:auto;padding:12px;}
.cart-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 12px;background:var(--cream);border-radius:10px;margin-bottom:8px;gap:8px;
}
.cart-item-name{font-size:13px;font-weight:500;color:var(--text);}
.cart-item-price{font-size:12px;color:var(--muted);}
.cart-item-right{display:flex;align-items:center;gap:8px;}
.cart-item-total{font-size:13px;font-weight:600;color:var(--brown);min-width:60px;text-align:right;}
.cart-footer{padding:14px;border-top:1px solid var(--light-gold);}
.cart-total-row{display:flex;justify-content:space-between;margin-bottom:12px;}
.cart-total-label{font-size:14px;color:var(--muted);}
.cart-total-val{font-size:16px;font-weight:600;color:var(--brown);font-family:'Cormorant Garamond',serif;}
.cart-checkout-btn{
  width:100%;background:var(--brown);color:#F5EDD8;border:none;border-radius:12px;
  padding:12px;font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;
  font-weight:500;transition:opacity 0.15s;
}
.cart-checkout-btn:hover{opacity:.85}
.empty-cart{text-align:center;color:var(--muted);font-size:14px;padding:40px 20px;}

/* ── DATE/TIME PICKER ── */
.picker-wrap{
  background:var(--white);border:1px solid var(--light-gold);border-radius:14px;
  padding:14px;margin-top:4px;max-width:92%;
}
.picker-label{font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500;}
.picker-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
select.picker-select{
  border:1px solid var(--light-gold);border-radius:8px;padding:7px 10px;
  font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);
  background:var(--cream);outline:none;cursor:pointer;
}
select.picker-select:focus{border-color:var(--brown);}
.picker-confirm-btn{
  background:var(--brown);color:#F5EDD8;border:none;border-radius:8px;
  padding:7px 16px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;
  font-weight:500;transition:opacity 0.15s;margin-top:4px;
}
.picker-confirm-btn:hover{opacity:.85}

/* ── RESERVATION SUMMARY ── */
.res-summary{
  background:var(--white);border:1px solid var(--light-gold);
  border-radius:14px;padding:14px;margin-top:4px;max-width:92%;
}
.res-summary-title{
  font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;
  color:var(--brown);margin-bottom:10px;
}
.res-row{display:flex;gap:8px;margin-bottom:6px;font-size:13px;}
.res-icon{font-size:14px;flex-shrink:0;}
.res-label{color:var(--muted);min-width:70px;}
.res-val{color:var(--text);font-weight:500;}

/* ── RESPONSIVE ── */
@media(max-width:520px){
  .chat-wrap{height:100vh;height:100dvh;border-radius:0;max-width:100%;}
  body{padding:0;align-items:stretch;}
  .cart-panel{border-radius:0;}
}

/* ── AI PROVIDER BADGE ── */
.ai-badge{
  font-size:10px;color:var(--muted);text-align:center;padding:4px;
  background:var(--cream);border-top:0.5px solid var(--light-gold);
  flex-shrink:0;
}

</head>

// ── AI CALL WITH FALLBACK ──────────────────────
async function callAI(userMessage) {
  conversationHistory.push({role:"user", content: userMessage});
  
  // Try Groq first
  try {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+config.GROQ_API_KEY},
      body: JSON.stringify({
        model: config.GROQ_MODEL,
        messages: [{role:"system",content:SYSTEM_PROMPT}, ...conversationHistory],
        max_tokens: 400,
        temperature: 0.7
      })
    });
    if(!res.ok) throw new Error("Groq failed: "+res.status);
    const data = await res.json();
    const reply = data.choices[0].message.content;
    conversationHistory.push({role:"assistant", content: reply});
    aiProvider = "Groq";
    return reply;
  } catch(e) {
    console.warn("Groq failed, trying Gemini...", e);
  }

  // Fallback to Gemini
  try {
    const geminiHistory = conversationHistory.slice(0,-1).map(m=>({
      role: m.role==="assistant"?"model":"user",
      parts:[{text:m.content}]
    }));
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${config.GEMINI_MODEL}:generateContent?key=${config.GEMINI_API_KEY}`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        system_instruction:{parts:[{text:SYSTEM_PROMPT}]},
        contents: [...geminiHistory, {role:"user", parts:[{text:userMessage}]}],
        generationConfig:{maxOutputTokens:400, temperature:0.7}
      })
    });
    if(!res.ok) throw new Error("Gemini failed: "+res.status);
    const data = await res.json();
    const reply = data.candidates[0].content.parts[0].text;
    conversationHistory.push({role:"assistant", content: reply});
    aiProvider = "Gemini";
    return reply;
  } catch(e) {
    console.error("Both AI providers failed", e);
    return "I'm having a little trouble right now ☕ Please try again in a moment, or contact us directly at +92 331 3677131!";
  }
}

// ── CART ────────────────────────────────────────
function updateCart(id, name, price, delta) {
  if(!cart[id]) cart[id]={name,price,qty:0};
  cart[id].qty = Math.max(0, cart[id].qty + delta);
  if(cart[id].qty===0) delete cart[id];
  
  // Update qty display in msg
  const qEl = document.getElementById('qty-'+id);
  if(qEl) qEl.textContent = cart[id]?.qty||0;
  
  // Update cart btn
  const total = Object.values(cart).reduce((s,i)=>s+i.qty,0);
  const btn = document.getElementById('cart-btn');
  const cnt = document.getElementById('cart-count');
  if(total>0){btn.style.display='flex';cnt.textContent=total;}
  else btn.style.display='none';
}

function openCart() {
  const panel = document.getElementById('cart-panel');
  panel.style.display='flex';
  renderCart();
}

function closeCart() {
  document.getElementById('cart-panel').style.display='none';
}

function renderCart() {
  const items = document.getElementById('cart-items');
  const total_el = document.getElementById('cart-total');
  const entries = Object.entries(cart);
  if(!entries.length){
    items.innerHTML='<div class="empty-cart">🛒<br><br>Your cart is empty.<br>Browse the menu to add items!</div>';
    total_el.textContent='Rs. 0';
    return;
  }
  let total=0;
  items.innerHTML='';
  entries.forEach(([id,item])=>{
    const subtotal=item.price*item.qty;total+=subtotal;
    const d=document.createElement('div');
    d.className='cart-item';
    d.innerHTML=`
      <div style="flex:1">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">Rs. ${item.price} × ${item.qty}</div>
      </div>
      <div class="cart-item-right">
        <div class="qty-control">
          <button class="qty-btn" onclick="updateCart('${id}','${item.name}',${item.price},-1);renderCart()">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="updateCart('${id}','${item.name}',${item.price},1);renderCart()">+</button>
        </div>
        <div class="cart-item-total">Rs. ${subtotal}</div>
      </div>`;
    items.appendChild(d);
  });
  total_el.textContent='Rs. '+total;
}

function proceedCheckout() {
  closeCart();
  const cartSummary = Object.values(cart).map(i=>`${i.name} ×${i.qty}`).join(', ');
  const total = Object.values(cart).reduce((s,i)=>s+i.price*i.qty,0);
  reservation.cartItems = cartSummary;
  reservation.cartTotal = total;
  step='branch';
  addMsg(`Great choices! 🎉 Your order (Rs. ${total}) is noted.<br><br>Now let's reserve your table. Which branch would you prefer?`,'bot');
  setChips([['🏪 Qasimabad Branch','branch-qasimabad'],['🏪 Autobahn Branch','branch-autobahn'],['← Back','back']]);
}

function renderMenuCard(category, items) {
  const msgs = document.getElementById('msgs');
  const card = document.createElement('div');
  card.className='menu-card';
  let inner=`<div class="menu-card-title">${category}</div>`;
  
  const arr = Array.isArray(items)?items:
    [...(items.hot||[]).map(i=>({...i,_sub:'Hot'})),...(items.iced||[]).map(i=>({...i,_sub:'Iced'}))];

  let lastSub='';
  arr.forEach(item=>{
    if(item._sub && item._sub!==lastSub){
      inner+=`<div style="font-size:11px;color:var(--muted);font-weight:500;margin:6px 0 3px;">${item._sub}</div>`;
      lastSub=item._sub;
    }
    const priceDisplay = item.priceL ? `R: ${item.price} / L: ${item.priceL}` : item.price;
    inner+=`<div class="menu-item">
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-price">Rs. ${priceDisplay}</div>

  msgs.scrollTop=msgs.scrollHeight;
}

    setChips([['1','guests-1'],['2','guests-2'],['3','guests-3'],['4','guests-4'],['5–6','guests-5-6'],['7+','guests-7+']]);
  } else if(key.startsWith('guests-')) {
    reservation.guests = key.replace('guests-','');
    step='name';
    addMsg(`${reservation.guests} guest${reservation.guests!=='1'?'s':''} — noted! 📝<br>Please type your <strong>full name</strong> for the reservation.`, 'bot');
    setChips([]);
  } else if(key==='confirm-yes') {
    step=null;
    addMsg(`🎉 <strong>Reservation Confirmed!</strong><br><br>
      Your table at <strong>Crème By SI — ${reservation.branch}</strong> is booked!<br><br>
      We'll reach out to <strong>${reservation.contact}</strong> to confirm. See you on <strong>${reservation.date} at ${reservation.time}</strong>! ☕✨<br><br>
      <em>For queries: +92 331 3677131</em>`, 'bot');
    reservation={};cart={};
    document.getElementById('cart-btn').style.display='none';
    setChips([['📋 Browse Menu','menu'],['📍 Location','location'],['← Home','back']]);
  } else if(key==='back') {
    addMsg('How can I help you? 😊','bot');
    setChips([['📋 View Menu','menu'],['🪑 Reserve a Table','reserve'],['📍 Location & Hours','location'],['❓ FAQs','faq']]);
  }
}

// ── TEXT INPUT HANDLER ─────────────────────────
async function handleTextInput(text) {
  const lower = text.toLowerCase();

  // Reservation flow
  if(step==='name') {
    reservation.name=text; step='contact';
    addMsg(`Nice to meet you, <strong>${text}</strong>! 😊<br>Please share your <strong>WhatsApp / contact number</strong>.`, 'bot');
    return;
  }
  if(step==='contact') {
    reservation.contact=text; step='date';
    addMsg(`Got it! Now let's pick your visit date. 📅`, 'bot');
    setTimeout(showDatePicker, 300);
    return;
  }

  // Quick keyword shortcuts (no AI needed)
  if(lower.match(/\b(menu|drink|coffee|latte|matcha|frappe)\b/)) { respond('menu'); return; }
  if(lower.match(/\b(reserv|book|table|seat)\b/)) { respond('reserve'); return; }
  if(lower.match(/\b(locat|where|address|branch|direction)\b/)) { respond('location'); return; }
  if(lower.match(/\b(hi|hello|hey|salam|hola)\b/)) {
    addMsg(`Hello! Welcome to Crème By SI ☕<br>How can I help you today?`, 'bot');
    setChips([['📋 View Menu','menu'],['🪑 Reserve a Table','reserve'],['📍 Location & Hours','location'],['❓ FAQs','faq']]);
    return;
  }
  if(lower.match(/\b(thank|thanks|shukriya)\b/)) {
    addMsg(`You're so welcome! 😊 We look forward to serving you at Crème By SI. ☕`, 'bot');
    setChips([['📋 Menu','menu'],['🪑 Reserve','reserve'],['← Home','back']]);
    return;
  }

  // Use AI for everything else
  showTyping();
  const reply = await callAI(text);
  hideTyping();
  addMsg(reply.replace(/\n/g,'<br>'), 'bot');
  setChips([['📋 View Menu','menu'],['🪑 Reserve a Table','reserve'],['📍 Location & Hours','location'],['❓ FAQs','faq']]);
}

function sendMsg() {
  const inp = document.getElementById('userinput');
  const text = inp.value.trim();
  if(!text) return;
  addMsg(text,'user');
  inp.value='';
  handleTextInput(text);
}
